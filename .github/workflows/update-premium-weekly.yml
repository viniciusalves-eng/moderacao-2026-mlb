name: Atualizar Dados Premium Carriers (Semanal)

on:
  schedule:
    # Todo domingo às 06:00 UTC (03:00 Brasília)
    - cron: '0 6 * * 0'
  workflow_dispatch:   # permite rodar manualmente pelo GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necessário para commitar o JSON atualizado

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install google-cloud-bigquery

      - name: Rodar script de atualização
        run: python scripts/update_premium_carriers.py

      - name: Commitar JSON atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_premium_carriers.json
          git diff --staged --quiet || git commit -m "chore: atualiza dados premium carriers $(date +'%Y-%m-%d')"
          git push
